<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Family Trip Organizer 🏕️</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="header">
    <h1 id="appTitle">🏕️ Family Trip Organizer</h1>
    <div id="appSub" class="subtext">Loading...</div>
  </header>

  <nav class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </nav>

  <main class="content" id="content">
    <div class="loading">Loading...</div>
  </main>

  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h2 id="modalTitle">Modal</h2>
      <form id="modalForm">
        <div id="modalBody"></div>
        <div class="modal-btns">
          <button class="btn" type="button" id="modalCancelBtn">Cancel</button>
          <button class="btn primary" type="submit" id="modalSubmitBtn">Save</button>
        </div>
      </form>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
